<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highest Grossing Films</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Highest Grossing Films</h1>
    </header>

    <section class="controls">
        <label for="filterDirector">Filter by Director:</label>
        <input type="text" id="filterDirector" placeholder="Type director name...">

        <label for="sortSelect">Sort by:</label>
        <select id="sortSelect">
            <option value="title">Title</option>
            <option value="year">Release Year</option>
            <option value="box_office">Box Office</option>
        </select>
    </section>

    <section id="filmsContainer" class="films-container">
        <!-- Films will be loaded here dynamically -->
    </section>

    <script src="script.js"></script>
</body>
</html>
