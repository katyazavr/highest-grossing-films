<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highest Grossing Films</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Highest Grossing Films</h1>
    </header>

    <section class="controls">
        <label for="sortSelect">Sort by Year:</label>
        <select id="sortSelect">
            <option value="desc">Descending</option>
            <option value="asc">Ascending</option>
        </select>
    </section>

    <section class="chart-section">
        <h2>Distribution of Films by Country</h2>
        <canvas id="countryChart" width="400" height="200"></canvas>
    </section>

    <section id="filmsContainer" class="films-container">
        <!-- Films will be loaded here dynamically -->
    </section>

    <script src="script.js"></script>
</body>
</html>
